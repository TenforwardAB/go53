name: Deploy docs

# Builds the theme-less Hugo site in docs/ and publishes it to GitHub Pages
# (mapped to go53.eu via docs/CNAME). Replaces the previous static-HTML docs.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.128.0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo (extended)
        run: |
          curl -sSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -o /tmp/hugo.deb
          sudo dpkg -i /tmp/hugo.deb

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        working-directory: docs
        run: hugo --minify --gc

      - name: Preserve custom domain (CNAME)
        run: cp docs/CNAME docs/public/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
