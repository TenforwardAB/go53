name: Container Image Build and Push

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/container.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/go53:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/go53:latest
          labels: |
            org.opencontainers.image.title=go53
            org.opencontainers.image.description=Distributed DNS Server
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  create-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        id: release_notes
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          ## Container Image

          This release includes a Docker/Podman container image for easy deployment.

          ### Quick Start

          Pull and run the image:
          ```bash
          # Pull the image
          podman pull ghcr.io/${{ github.repository_owner }}/go53:${{ steps.version.outputs.version }}

          # Run with persistent data
          podman volume create go53_data
          podman run -d \
            --name go53 \
            -p 53:53/udp \
            -p 53:53/tcp \
            -p 2053:2053/tcp \
            -p 8053:8053/tcp \
            -p 53530:53530/tcp \
            -v go53_data:/var/lib/go53 \
            ghcr.io/${{ github.repository_owner }}/go53:${{ steps.version.outputs.version }}
          ```

          ### Using Docker Compose

          ```bash
          docker-compose up -d
          ```

          ### Image Details
          - **Base**: Alpine Linux (~70MB)
          - **Includes**: go53 server + go53ctl CLI tool
          - **Ports**: DNS (53), API (8053), Cluster Sync (53530)
          - **User**: Non-root (go53)
          - **Health Checks**: Enabled

          For more information, see [Container Documentation](docs/CONTAINER.md)
          EOF
          cat /tmp/release_notes.md

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: /tmp/release_notes.md
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Set status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "✅ Container image built and pushed successfully"
            echo "Image: ghcr.io/${{ github.repository_owner }}/go53:${{ github.ref_type == 'tag' && github.ref || 'latest' }}"
          else
            echo "❌ Container image build failed"
          fi
