<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 760" width="840" height="760" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="go53 backup and restore lifecycle flow chart">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <style>
      .node { fill: #e8f3f1; stroke: #0f766e; stroke-width: 1.5; }
      .group { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.3; stroke-dasharray: 6 5; }
      .glabel { fill: #475569; font-size: 13px; font-weight: 700; letter-spacing: .02em; }
      .lbl { fill: #0f172a; font-size: 13px; text-anchor: middle; }
      .cmd { fill: #0f172a; font-size: 12px; font-family: ui-monospace, Menlo, Consolas, monospace; text-anchor: middle; }
      .edge { stroke: #64748b; stroke-width: 1.6; fill: none; }
      .dotted { stroke: #0f766e; stroke-width: 1.6; fill: none; stroke-dasharray: 5 5; }
      .elabel { fill: #0f766e; font-size: 11px; font-style: italic; }
      .done { fill: #0f766e; stroke: #0f766e; }
      .donetext { fill: #ffffff; font-size: 13px; text-anchor: middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="840" height="760" fill="#ffffff"/>

  <!-- LIVE subgraph -->
  <rect class="group" x="255" y="36" width="330" height="250" rx="12"/>
  <text class="glabel" x="275" y="58">Live server</text>

  <rect class="node" x="275" y="74" width="290" height="54" rx="9"/>
  <text class="lbl" x="420" y="96">Mutating API call</text>
  <text class="lbl" x="420" y="114" font-size="11.5" fill="#475569">zone edit, import, config, TSIG</text>

  <rect class="node" x="275" y="150" width="290" height="50" rx="9"/>
  <text class="lbl" x="420" y="180">Append logical WAL event</text>

  <rect class="node" x="275" y="222" width="290" height="50" rx="9"/>
  <text class="cmd" x="420" y="252">wal-meta/last_seq advances</text>

  <line class="edge" x1="420" y1="128" x2="420" y2="150" marker-end="url(#arrow)"/>
  <line class="edge" x1="420" y1="200" x2="420" y2="222" marker-end="url(#arrow)"/>

  <!-- Base backup branch (left) -->
  <rect class="node" x="40" y="336" width="300" height="54" rx="9"/>
  <text class="cmd" x="190" y="358">go53ctl backup create</text>
  <text class="cmd" x="190" y="376">--out base.tar</text>

  <rect class="node" x="40" y="414" width="300" height="50" rx="9"/>
  <text class="lbl" x="190" y="444">manifest: snapshot_end_seq</text>

  <line class="edge" x1="190" y1="390" x2="190" y2="414" marker-end="url(#arrow)"/>

  <!-- WAL follow branch (right) -->
  <rect class="node" x="500" y="336" width="300" height="54" rx="9"/>
  <text class="cmd" x="650" y="358">go53ctl backup wal-follow</text>
  <text class="cmd" x="650" y="376">--dir /backup/wal</text>

  <rect class="node" x="500" y="414" width="300" height="54" rx="9"/>
  <text class="lbl" x="650" y="436">Atomic WAL segments</text>
  <text class="lbl" x="650" y="454">in archive directory</text>

  <path class="edge" d="M480,270 C540,300 600,300 648,334" marker-end="url(#arrow)"/>
  <line class="edge" x1="650" y1="390" x2="650" y2="414" marker-end="url(#arrow)"/>

  <!-- RECOVER subgraph -->
  <rect class="group" x="40" y="520" width="760" height="216" rx="12"/>
  <text class="glabel" x="60" y="544">Recover to any point in time</text>

  <rect class="node" x="70" y="560" width="300" height="54" rx="9"/>
  <text class="cmd" x="220" y="582">go53ctl restore backup</text>
  <text class="cmd" x="220" y="600">base.tar</text>

  <rect class="node" x="470" y="560" width="300" height="54" rx="9"/>
  <text class="cmd" x="620" y="582">go53ctl restore wal</text>
  <text class="cmd" x="620" y="600">segment.g53wal</text>

  <rect class="node done" x="270" y="656" width="300" height="54" rx="9"/>
  <text class="donetext" x="420" y="678">Node reaches selected</text>
  <text class="donetext" x="420" y="696">recovery point</text>

  <line class="edge" x1="370" y1="587" x2="470" y2="587" marker-end="url(#arrow)"/>
  <path class="edge" d="M600,614 C540,648 480,648 446,656" marker-end="url(#arrow)"/>

  <!-- Dotted recovery feeds -->
  <line class="dotted" x1="200" y1="464" x2="300" y2="558" marker-end="url(#arrow)"/>
  <text class="elabel" x="248" y="508">base point</text>

  <line class="dotted" x1="648" y1="468" x2="624" y2="560" marker-end="url(#arrow)"/>
  <text class="elabel" x="612" y="512" text-anchor="end">replay after end_seq</text>
</svg>
