options {
	directory "/tmp";
	listen-on port 53 { any; };
	listen-on-v6 { none; };
	recursion no;
	dnssec-validation no;
	notify yes;
};

zone "catalog-member-a.test." {
	type primary;
	file "/etc/bind/zones/db.catalog-member-a.test";
	allow-transfer { 10.53.0.10; };
	also-notify { 10.53.0.10 port 2053; };
};
